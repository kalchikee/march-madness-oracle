model: xgboost
objective: log_loss
trials: 200
pruner: median
search_space:
  n_estimators: {low: 200, high: 1200, step: 100}
  max_depth: {low: 3, high: 8}
  learning_rate: {low: 0.01, high: 0.15, log: true}
  subsample: {low: 0.6, high: 1.0}
  colsample_bytree: {low: 0.5, high: 1.0}
  min_child_weight: {low: 1, high: 10}
  reg_lambda: {low: 0.01, high: 10.0, log: true}
  reg_alpha: {low: 0.0001, high: 1.0, log: true}
