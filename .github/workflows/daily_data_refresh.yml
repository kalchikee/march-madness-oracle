name: Daily Data Refresh

on:
  schedule:
    - cron: "0 6 * * *"  # 6 AM UTC daily
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Check month (run Nov–Apr only)
        id: check_month
        run: |
          MONTH=$(date -u +%m)
          if [[ "$MONTH" == "05" || "$MONTH" == "06" || \
                "$MONTH" == "07" || "$MONTH" == "08" || \
                "$MONTH" == "09" || "$MONTH" == "10" ]]; then
            echo "Outside season; exiting."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check_month.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        if: steps.check_month.outputs.should_run == 'true'
        run: pip install -e ".[dev]"

      - name: Download latest DuckDB snapshot
        if: steps.check_month.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          from madness.storage import download_latest
          import os
          download_latest(os.environ["GITHUB_REPOSITORY"])
          PY

      - name: Refresh data
        if: steps.check_month.outputs.should_run == 'true'
        env:
          KENPOM_USER: ${{ secrets.KENPOM_USER }}
          KENPOM_PASS: ${{ secrets.KENPOM_PASS }}
        run: |
          madness ingest tournament --start 1985
          madness ingest torvik --start 2008

      - name: Upload DuckDB snapshot
        if: steps.check_month.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          from madness.storage import upload_latest
          import os
          upload_latest(os.environ["GITHUB_REPOSITORY"], notes="daily refresh")
          PY

      - name: Commit small artifacts
        if: steps.check_month.outputs.should_run == 'true'
        run: |
          git config user.name "madness-bot"
          git config user.email "madness-bot@users.noreply.github.com"
          git add data/processed models experiments || true
          git diff --cached --quiet || git commit -m "chore: daily data refresh"
          git push || true

