name: Weekly Retrain

on:
  schedule:
    - cron: "0 4 * * 0"  # Sunday 4 AM UTC
  workflow_dispatch:
    inputs:
      trials:
        description: "Optuna trials per model"
        default: "50"

jobs:
  tune:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        model: [xgboost, lightgbm, catboost]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -e ".[dev]"

      - name: Download snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          from madness.storage import download_latest
          import os
          download_latest(os.environ["GITHUB_REPOSITORY"])
          PY

      - name: Tune model
        env:
          TRIALS: ${{ github.event.inputs.trials || '50' }}
        run: |
          madness train tune --model ${{ matrix.model }} --trials $TRIALS

      - name: Upload challengers
        uses: actions/upload-artifact@v4
        with:
          name: challenger-${{ matrix.model }}
          path: models/challengers/

  promote:
    needs: tune
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -e ".[dev]"

      - uses: actions/download-artifact@v4
        with:
          path: models/challengers

      - name: Promote best challenger if it beats champion
        run: |
          python scripts/promote_champion.py

      - name: Commit updates
        run: |
          git config user.name "madness-bot"
          git config user.email "madness-bot@users.noreply.github.com"
          git add models experiments
          git diff --cached --quiet || git commit -m "chore: weekly retrain"
          git push || true

